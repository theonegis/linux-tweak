<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Set preferred Sans-Serif font -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter Display</family>
      <family>OPPO Sans</family>
    </prefer>
  </alias>

  <!-- Set preferred Serif font -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif SC</family>
    </prefer>
  </alias>

  <!-- Set preferred Monospace font -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>SF Mono SC</family>
    </prefer>
  </alias>
</fontconfig>

